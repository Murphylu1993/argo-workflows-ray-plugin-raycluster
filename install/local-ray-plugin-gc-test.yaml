apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: ray-plugin-local-test-gc
spec:
  entrypoint: ray-test
  templates:
    - name: ray-test
      plugin:
        ray:
          apiVersion: ray.io/v1
          kind: RayCluster
          metadata:
            name: ray-plugin-local-cluster-gc
            namespace: argo
          spec:
            headGroupSpec:
              rayStartParams:
                dashboard-host: "0.0.0.0"
              template:
                spec:
                  containers:
                    - name: ray-head
                      image: rayproject/ray:2.9.3
                      ports:
                        - containerPort: 6379
                        - containerPort: 8265
                        - containerPort: 10001
                      resources:
                        requests:
                          cpu: "200m"
                          memory: "512Mi"
                        limits:
                          cpu: "500m"
                          memory: "1Gi"
            workerGroupSpecs:
              - groupName: worker
                replicas: 0
                minReplicas: 0
                maxReplicas: 0
                rayStartParams: {}
                template:
                  spec:
                    containers:
                      - name: ray-worker
                        image: rayproject/ray:2.9.3
                        resources:
                          requests:
                            cpu: "200m"
                            memory: "512Mi"
                          limits:
                            cpu: "500m"
                            memory: "1Gi"
