apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: ray-distributed-demo-
spec:
  entrypoint: ray-demo
  templates:
    - name: ray-demo
      plugin:
        ray:
          # RayCluster definition (Ray Operator must be installed in advance)
          apiVersion: ray.io/v1
          kind: RayCluster
          metadata:
            name: ray-example
            namespace: argo
          spec:
            rayVersion: "2.9.3"
            headGroupSpec:
              rayStartParams:
                dashboard-host: '0.0.0.0'
              template:
                spec:
                  containers:
                    - name: ray-head
                      image: rayproject/ray:2.9.3
                      ports:
                        - containerPort: 6379
                        - containerPort: 8265
                      resources:
                        limits:
                          cpu: 2
                          memory: 4Gi
            workerGroupSpecs:
              - replicas: 2
                minReplicas: 1
                maxReplicas: 3
                groupName: worker
                rayStartParams: {}
                template:
                  spec:
                    containers:
                      - name: ray-worker
                        image: rayproject/ray:2.9.3
                        resources:
                          limits:
                            cpu: 4
                            memory: 8Gi
